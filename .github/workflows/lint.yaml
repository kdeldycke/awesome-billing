---
name: 🧹 Lint
"on":
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - prepare-release
      - "renovate/**"

jobs:

  lint:
    uses: kdeldycke/repomatic/.github/workflows/lint.yaml@ac35a90ce5322a4e4593ae0db7cf348cec80952f # v6.10.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
