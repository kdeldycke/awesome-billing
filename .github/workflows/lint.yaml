---
name: 🧹 Lint
"on":
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - prepare-release
      - "renovate/**"

jobs:

  lint:
    uses: kdeldycke/repomatic/.github/workflows/lint.yaml@204a868c5345477f62a29715d2838ac1c6daa3ee # v6.9.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
